<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <script src="https://kit.fontawesome.com/3f9f3b7afa.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">

    <title>CalIMC</title>
</head>

<body>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="m-2">
            <a href="index.html" class="navbar-brand">
                <i class="fa-solid fa-calculator fa-2x imc mr-2"></i>
                Cal<span class="imc">IMC</span>
            </a>
        </div>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav-target">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav-target">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link p-3 aoClicar active" href="index.html">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3 aoClicar" href="imc.html">IMC</a>
                </li>
            </ul>
        </div>
    </nav>

    <section class="my-4">
        <div class="d-flex justify-content-center align-items-center text-center container">
            <i class="fa-solid fa-person icon-grande mr-3"></i>
            <div>
                <h1>
                    Bem-vindo ao Cal<span class="imc p-2">IMC</span> - Sua calculadora de IMC
                </h1>
                <p style="font-size:18px;">
                    A ferramenta rápida, mais fácil e precisa para monitorar sua saúde
                </p>
            </div>
            <i class="fa-solid fa-weight-scale icon-grande ml-3"></i>
        </div>
    </section>

    <section class="container d-flex justify-content-center mb-5">
        <div class="caixa p-4">
            
            <div class="titulo text-center mb-4">
                <h2>Calculadora - IMC</h2>
            </div>

            <div class="form-group row align-items-center">
                <label class="col-3 fonte">Nome:</label>
                <div class="col-9">
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
                </div>
            </div>

            <div class="form-group row align-items-center">
                <label class="col-3 fonte">Altura:</label>
                <div class="col-9">
                    <input type="number" class="form-control" id="altura" placeholder="Digite sua altura">
                </div>
            </div>

            <div class="form-group row align-items-center">
                <label class="col-3 fonte">Peso:</label>
                <div class="col-9">
                    <input type="number" class="form-control" id="peso" placeholder="Digite seu peso">
                </div>
            </div>

            <div class="row align-items-center botao mt-4">
                <div class="col text-center">
                    <button id="calcular" type="button" class="btn btn-outline-dark">
                        Calcular
                    </button>
                </div>
            </div>

            <div class="row align-items-center mt-4 caixaContar" id="resultado"></div>

        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

    <script src="script.js"></script>

</body>
</html>
